repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: [--fix, --show-fixes]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.1
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports, src/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.0.0
          - pydantic-settings>=2.0.0
          - langchain>=0.1.0
          - llama-index>=0.10.0
          - fastapi>=0.100.0
          - httpx>=0.25.0

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: pytest tests/ -x --no-header -q
        language: system
        pass_filenames: false
        always_run: true
